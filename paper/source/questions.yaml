          type: main_result
          required_in_core: true
      supports: [C.central, C.protocols]
    evidence:
      artifacts:
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
        - A_results_slt_p2_20260626_slt_p2_report_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.result.silentspeller_lite
          role: main_result
          group: results_main
          order: 3
          text: >
            To connect this framing back to SilentSpeller-style evaluation, we additionally use a
            word-holdout lite condition on subj1 with 100 unseen test word types. The vector/GRU recognizer
            obtains 0.1133 +/- 0.0128 greedy CER across four seeds. This is not claimed as a historical
            implementation reproduction; it is a same-dataset, spelling-oriented bridge showing that
            the recognizer remains effective when the test words are held out.
        - type: table
          id: tab.silentspeller_lite
          label: tab:silentspeller_lite
