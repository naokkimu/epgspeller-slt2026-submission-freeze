  Q.result.03_calibration:
    question: "What happens when the target user has little or no calibration data?"
    answer: "Zero-shot transfer is poor for subj3, but k=1 and k=2 within-subject calibration sharply reduce CER; higher k cannot be evaluated standardly from the available data."
    placement: {slot: core.result, order: 3, priority: required, core_required: true, extension_only: false, role: main_result, result_role: constraint_or_recovery}
    claims:
      emits:
        - id: C.calibration_curve
          statement: "For subj3, calibration reduces CER from roughly 0.84 in zero-shot transfer to 0.3503 at k=1 and 0.2458 at k=2, but 50-word evaluation at k=4 and k=8 is data-infeasible."
          type: main_result
          required_in_core: true
      supports: [C.central]
    evidence:
      artifacts:
        - A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
        - A_results_slt_p2_20260626_paper_tables_table_lowshot_extended_csv
        - A_results_slt_p2_20260626_kshot_feasibility_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.result.calibration
          role: main_result
          group: results_calibration
          order: 5
          text: >
            The calibration experiments turn the cross-user weakness into a more actionable result.
            For subj3, zero-shot transfer gives 0.8403 CER for single-source transfer and 0.8381 CER for
            multi-source transfer, while one and two target examples per word reduce CER to 0.3503 and
            0.2458. Additional k=1 runs on subj1 and subj2 give 0.1082 and 0.1118 CER, indicating that
            one-shot personalized calibration can be strong when each word has two productions. However, the
            available public data do not support a 50-word held-out evaluation at k=4 or k=8: only
            14 word types satisfy the k=4 repetition requirement for subj3, and none satisfy k=8.
        - type: table
          id: tab.kshot_curve
          label: tab:kshot_curve
          source_artifact: A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
          caption: "Calibration curve and feasibility for subj3. The k=4 row is reduced-vocabulary diagnostic evidence; k=8 is data-infeasible."
          role: main_result
          order: 6
        - type: table
          id: tab.lowshot_extended
          label: tab:lowshot_extended
          source_artifact: A_results_slt_p2_20260626_paper_tables_table_lowshot_extended_csv
          caption: "Low-shot extension beyond subj3 for subjects with two repetitions per word."
          role: main_result
          order: 7
          exclude_profiles: [slt2026]
    reviewer_risk:
      objection: "The k-shot curve could be criticized as incomplete."
      mitigation: "State that k=4 and k=8 are infeasible under the standard held-out-token protocol and use this as calibration-burden evidence."
    status: answered

  Q.result.04_cross_user:
    question: "Does multi-source transfer solve the cross-user problem?"
    answer: "No. Multi-source transfer and simple preprocessing controls can shift cross-user CER, but they do not close the gap to personalized decoding."
    placement: {slot: core.result, order: 4, priority: required, core_required: true, extension_only: false, role: main_result, result_role: failure_condition}
    claims:
      emits:
        - id: C.cross_user_bottleneck
          statement: "Cross-participant transfer remains substantially worse than personalized decoding even with multi-source variants and simple preprocessing controls."
          type: main_result
          required_in_core: true
      supports: [C.central]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_p3ms_compact_csv
        - A_results_paper_layout_2026_03_03_table_to4_compact_csv
        - A_results_msx20260224_paper_tables_table_p3ms_csv
        - A_results_uc20260226_paper_tables_table_to4_generalization_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_preproc20260626_preproc_ablation_report_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.result.cross_user
          role: main_result
          group: results_transfer
          order: 8
          text: >
            Multi-source transfer does not remove the bottleneck. Paired-source and multi-source variants
            sometimes improve over a single-source baseline, but the resulting errors are still far from
            personalized performance and vary strongly by target. For target subject 4, all-to-4 vector CER is
            0.686 in P3 and 0.582 in P3MS. A preprocessing sweep over raw, standardized, contact-matched,
            target-marginal, and PCA-standardized variants improves the best protocol-level averages only to
            0.6426 for P3 and 0.5692 for P3MS. For the paper's AAC framing, this means the current evidence
            supports personalized silent spelling, not an off-the-shelf model that can be deployed to a new
            user without calibration.
        - type: table
          id: tab.p3ms
          label: tab:p3ms
          source_artifact: A_results_paper_layout_2026_03_03_table_p3ms_compact_csv
          caption: "Multi-source cross-participant transfer results."
          role: main_result
          order: 9
          exclude_profiles: [slt2026]
        - type: table
          id: tab.to4_generalization
          label: tab:to4_generalization
          source_artifact: A_results_paper_layout_2026_03_03_table_to4_compact_csv
          caption: "Additional cross-participant generalization results for target subject 4."
          role: main_result
          order: 10
          exclude_profiles: [slt2026]
    reviewer_risk:
      objection: "A reviewer may ask why cross-user performance is not solved."
      mitigation: "Make it an explicit result and use it to motivate calibration as the next bottleneck."
    status: answered

  Q.result.05_validation_controls:
    question: "Which validation checks support the cross-user interpretation?"
    answer: "Multi-source training, target-specific transfer directions, and preprocessing controls reduce protocol ambiguity but do not change the personalized-only claim boundary."
    placement: {slot: core.result, order: 5, priority: required, core_required: true, extension_only: false, role: main_result, result_role: validation_check}
    claims: {emits: [], supports: [C.cross_user_bottleneck, C.boundary]}
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_p3ms_compact_csv
        - A_results_paper_layout_2026_03_03_table_to4_compact_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_preproc20260626_preproc_ablation_report_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.result.validation_controls
          role: main_result
          group: results_transfer
          order: 1
          text: >
            These transfer results are interpreted alongside validation controls, not as an isolated negative
            table. Multi-source training, target-specific transfer directions, and preprocessing variants all
            test whether the observed gap can be attributed to a simple protocol artifact. They reduce some
            ambiguities, but they do not change the claim boundary: the present system is supported as
            personalized lexicon-free spelling, not as deployment without target calibration.
    reviewer_risk:
      objection: "The validation paragraph may sound like a post-hoc excuse for weak transfer."
      mitigation: "Tie it directly to pre-declared controls and keep the conclusion bounded."
    status: answered

  Q.limit.registration:
    question: "What limitation must be visible in the core paper?"
    answer: "The paper does not prove EPG text entry without target calibration; it proves strong personalized recognition, shows that simple cross-user normalization is insufficient, and documents why high-k calibration cannot be fully evaluated without denser repeated recordings."
    placement: {slot: core.boundary, order: 1, priority: required, core_required: true, extension_only: false, role: core_limitation, result_role: claim_scope}
    claims:
      emits:
        - id: C.boundary
          statement: "The current evidence is bounded to four participants and available repetition densities; simple normalization does not remove cross-user error, and high-k calibration requires denser per-user data."
          type: limitation
          required_in_core: true
      supports: [C.central, C.calibration_curve]
    evidence:
      artifacts:
        - A_results_slt_p2_20260626_kshot_feasibility_csv
        - A_results_slt_p2_20260626_experiment_status_md
        - A_results_slt_p2_20260626_split_audit_protocol_split_summary_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_preproc20260626_experiment_status_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.limit.registration
          role: core_limitation
          group: core_boundary
          order: 1
          text: >
            The strongest limitation is not decoding speed or the existence of a recognizer. It is calibration.
            The experiments show that EPGSpeller can work well when participant-specific data are available,
            but cross-user transfer remains weak. The preprocessing ablation rules out a simple explanation in
            which train-only standardization, contact-rate matching, target marginal normalization, or PCA
            alone closes the gap; the best protocol-level preprocessing averages remain 0.6426 CER for P3
            and 0.5692 CER for P3MS. The experiments also show that the present public recordings do not
            contain enough repeated productions per word to run a 50-word held-out calibration evaluation at
            k=4 or k=8. Future AAC-oriented EPG datasets therefore need denser repeated spelling trials, not only
            more model variants.
    reviewer_risk:
      objection: "The limitation might be seen as a missing experiment."
      mitigation: "Tie the limitation to the feasibility audit and explain that additional data collection would be required."
    status: answered

  Q.extension.00_preprocessing:
    question: "Can the cross-user failure be explained away by simple preprocessing or normalization?"
    answer: "No. Train-only standardization, contact-rate matching, target marginal normalization, and PCA/no-PCA controls move the numbers but do not make cross-user transfer competitive with personalized decoding."
    placement: {slot: extension.analysis, order: 1, priority: optional, core_required: false, extension_only: true, role: extended_ablation}
    claims:
      emits:
        - id: C.preprocessing_ablation
          statement: "Simple preprocessing controls do not remove the cross-user bottleneck; the best protocol-level CER remains 0.6426 for P3 and 0.5692 for P3MS."
          type: analysis
          required_in_core: false
      supports: [C.cross_user_bottleneck, C.boundary]
    evidence:
      artifacts:
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_preproc20260626_paper_tables_table_preproc_direction_condition_csv
        - A_results_preproc20260626_preproc_ablation_report_md
        - A_results_preproc20260626_experiment_status_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.extension.preprocessing
          role: extended_ablation
          group: extension_analysis
          order: 1
          text: >
            The preprocessing sweep tests whether the cross-user result is just a scale or contact-rate
            artifact. It covers 120 runs over six transfer directions, four seeds, and five preprocessing
            conditions: raw standardized, raw unstandardized, contact-rate matched, target-marginal
            normalized, and PCA-standardized. The best protocol-level averages are still 0.6426 CER for P3
            and 0.5692 CER for P3MS. This supports the calibration-bottleneck interpretation: simple
            normalization helps in some directions but does not create an EPG spelling system that works for
            a new user without target calibration.
        - type: table
          id: tab.preproc_protocol
          label: tab:preproc_protocol
          source_artifact: A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
          caption: "Preprocessing ablation summarized by protocol and condition."
          role: extended_ablation
          order: 2
        - type: table
          id: tab.preproc_direction
          label: tab:preproc_direction
          source_artifact: A_results_preproc20260626_paper_tables_table_preproc_direction_condition_csv
          caption: "Preprocessing ablation by transfer direction."
          role: extended_ablation
          order: 3
    reviewer_risk:
      objection: "A reviewer may suspect cross-user transfer fails only because of a trivial normalization mismatch."
      mitigation: "Report the preprocessing sweep as a bounded negative result: useful controls, but not a solved transfer method."
    status: answered

  Q.extension.spatial_frontends:
    question: "What ablation belongs outside the core claim?"
    answer: "Spatial and layout-aware front ends are useful to report, but they are not the central reason the interface works."
    placement: {slot: extension.analysis, priority: optional, core_required: false, extension_only: true, role: extended_ablation}
    claims:
      emits:
        - id: C.spatial_ablation
          statement: "Layout-aware EPG front ends do not consistently outperform the vector/GRU baseline under the evaluated protocols."
          type: analysis
          required_in_core: false
      supports: [C.workflow]
    evidence:
      artifacts:
        - A_results_msx20260224_paper_tables_table_spatial_k124_csv
        - A_results_msx20260224_paper_tables_table_spatial_k64_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.extension.spatial_frontends
          role: extended_ablation
          group: extension_analysis
          order: 1
          text: >
            The spatial ablations are important but should not become the paper's headline. Row-column
            pooling is often close to the vector baseline, whereas two-dimensional grid variants can increase
            CER and RTF. The result is useful because it prevents an overly simple story that palatal layout
            always helps; in this dataset, the fastest and most reliable spelling recognizer is the vector/GRU
            baseline.
        - type: table
          id: tab.spatial_k124
          label: tab:spatial_k124
          source_artifact: A_results_msx20260224_paper_tables_table_spatial_k124_csv
          caption: "Spatial front-end comparison with the full electrode set."
          role: extended_ablation
          order: 2
        - type: table
          id: tab.spatial_k64
          label: tab:spatial_k64
          source_artifact: A_results_msx20260224_paper_tables_table_spatial_k64_csv
          caption: "Spatial front-end comparison at a 64-electrode budget."
          role: extended_ablation
          order: 3
    reviewer_risk:
      objection: "Reviewers may expect a spatial model to be the main method."
      mitigation: "Report spatial models as ablations and preserve the stronger text-entry/calibration narrative."
    status: answered

  Q.extension.electrode_budget:
    question: "What robustness analysis strengthens the paper?"
    answer: "Electrode-budget analyses show that smaller channel sets can preserve much of the result, but no universal subset method dominates."
    placement: {slot: extension.analysis, priority: optional, core_required: false, extension_only: true, role: extended_ablation}
    claims:
      emits:
        - id: C.electrode_budget
          statement: "At 64 electrodes, several selection methods perform similarly enough that the paper should avoid claiming a universal electrode-selection rule."
          type: analysis
          required_in_core: false
      supports: [C.central]
    evidence:
      artifacts:
        - A_results_msx20260224_paper_tables_table_k64_methods_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.extension.electrode_budget
          role: extended_ablation
          group: extension_analysis
          order: 4
          text: >
            The electrode-budget analysis is best used as a practical robustness result. A reduced 64-electrode
            representation can preserve much of the performance, but within-subject top-k, farthest-point
            selection, transfer-derived selection, and random subsets are close enough that the paper should
            not claim a universal channel-selection rule.
        - type: table
          id: tab.k64_methods
          label: tab:k64_methods
          source_artifact: A_results_msx20260224_paper_tables_table_k64_methods_csv
          caption: "Comparison of 64-electrode selection methods."
          role: extended_ablation
          order: 5
    reviewer_risk:
      objection: "A broad electrode-selection claim would overreach."
      mitigation: "Use the table as engineering evidence, not as a universal sensor-design theorem."
    status: answered

  Q.audit.trace:
    question: "What audit trace should the supplement expose?"
    answer: "The qpaper trace links claims, paragraphs, and tables to observed artifacts in evidence/index.yaml."
    placement: {slot: extension.audit, priority: optional, core_required: false, extension_only: true, role: auditability}
    claims: {emits: [], supports: [C.boundary]}
    evidence:
      artifacts:
        - A_results_slt_p2_20260626_slt_p2_report_md
        - A_results_slt_p2_20260626_experiment_status_md
        - A_results_slt_p2_20260626_split_audit_protocol_split_summary_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.audit.trace
          role: auditability
          group: extension_audit
          order: 1
          text: >
            For review and revision, the qpaper source keeps the manuscript organized as claim-bearing
            question cards. Each result paragraph and table points to an observed artifact ID in
            evidence/index.yaml, and the generated trace files expose the mapping from claims to evidence.
            This audit layer is not the scientific contribution, but it reduces the risk that paper text,
            generated tables, and experiment artifacts drift apart during submission editing.
    reviewer_risk:
      objection: "Auditability could distract from the AAC contribution."
      mitigation: "Keep audit details in the supplement or internal trace, not in the Introduction."
    status: answered

  Q.audit.manual_edit:
    question: "How are manual edits handled?"
    answer: "Generated TeX is treated as a reproducible draft view; human-edited venue TeX should live under paper/final while preserving qpaper block anchors."
    placement: {slot: extension.audit, priority: optional, core_required: false, extension_only: true, role: auditability}
