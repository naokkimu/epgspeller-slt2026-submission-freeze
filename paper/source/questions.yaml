    render:
      outputs:
        - type: paragraph
          id: para.audit.manual_edit
          role: auditability
          group: extension_audit
          order: 2
          text: >
            The generated TeX is a reproducible draft view, not the only editable manuscript. Venue-specific
            cleanup can be copied into paper/final while preserving qpaper block anchors, so later checks can
