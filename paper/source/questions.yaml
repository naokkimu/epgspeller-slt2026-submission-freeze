paper:
  title_working: "EPGSpeller: Towards Fast, Hands-Free AAC Text Entry with Electropalatographic Silent Spelling"
  central_intent: "Show that electropalatographic silent spelling can support lexicon-free hands-free text entry when personalized calibration is available, while cross-user calibration remains the central bottleneck."
questions:
  Q.problem.aac_text_entry:
    question: "What concrete AAC problem motivates this paper?"
    answer: "People who cannot rely on speech or manual input need a text-entry channel that can be used silently and hands-free."
    placement: {slot: core.problem, order: 1, priority: required, core_required: true, extension_only: false, role: problem, rhetorical_role: intro.problem}
    claims: {emits: [], supports: []}
    evidence: {artifacts: [], status: not_required}
    render:
      outputs:
        - type: paragraph
          id: para.problem.aac_text_entry
          role: problem
          group: intro_problem
          order: 1
          text: >
            Hands-free text entry is a central problem for augmentative and alternative communication (AAC):
            many users and usage settings cannot assume reliable speech, hand movement, or a visible keyboard.
            Silent speech interfaces offer an appealing route, but a practical AAC channel must support more
            than a small set of pre-defined commands. It must let users compose words and messages.
    reviewer_risk:
      objection: "The title promises fast text entry, but the experiments report recognition and inference metrics rather than a human WPM study."
      mitigation: "Use 'towards fast text entry' and distinguish text-entry potential from measured low real-time factors."
    status: answered

  Q.problem.epg_signal:
    question: "What does the SmartPalate/EPG device actually provide?"
    answer: "It provides a multichannel time series of tongue-palate contact during silent articulation."
    placement: {slot: core.problem, order: 2, priority: required, core_required: true, extension_only: false, role: problem, rhetorical_role: intro.reframing}
    claims:
      emits:
        - id: C.epg_signal
          statement: "The SilentSpeller-style data used here are multichannel electropalatographic contact time series paired with prompted word labels."
          type: data_description
          required_in_core: true
      supports: []
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_dataset_summary_csv
        - A_results_dataset_audit_silentspeller_2026_02_24_dataset_summary_csv
        - A_results_dataset_audit_silentspeller_2026_02_24_report_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.problem.epg_signal
          role: problem
          group: intro_problem
          order: 2
          text: >
            Electropalatography (EPG) makes this setting concrete. A SmartPalate-style sensor records
            tongue-palate contact as a multichannel temporal pattern while the user silently articulates.
            In the SilentSpeller-style recordings used in this work, each trial is a variable-length EPG
            sequence paired with the word that the participant attempted to spell or articulate.
    reviewer_risk:
      objection: "Reviewers may not know what the device measures."
      mitigation: "Define EPG as contact time series before introducing any model or benchmark terminology."
    status: answered

  Q.problem.prior_capability:
    question: "What have prior silent-speech interfaces already shown?"
    answer: "Prior work has shown useful command or constrained text-entry capability, but that is not yet arbitrary AAC spelling from character evidence."
    placement: {slot: core.problem, order: 3, priority: required, core_required: true, extension_only: false, role: problem, rhetorical_role: intro.prior_capability}
    claims: {emits: [], supports: [C.epg_signal]}
    evidence:
      artifacts:
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_report_md
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_coverage_matrix_csv
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_references_audit_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.problem.prior_capability
          role: problem
          group: intro_problem
          order: 1
          text: >
            Prior silent-speech interfaces have shown that silent articulatory or biosignal patterns can be
            mapped to useful commands or constrained text-entry actions. That capability is important, but it
            is not the same as an AAC text channel that lets a user spell arbitrary messages from character
            evidence.
    reviewer_risk:
      objection: "The related-work gap could be read as ignoring command-recognition progress."
      mitigation: "Acknowledge prior capability, then separate it from the open-message spelling target."
    status: answered

  Q.problem.fixed_vocabulary:
    question: "What gap remains after silent command recognition?"
    answer: "Fixed-vocabulary silent commands do not by themselves provide open message composition; spelling recognition attacks that limitation."
    placement: {slot: core.problem, order: 4, priority: required, core_required: true, extension_only: false, role: problem, rhetorical_role: intro.gap}
    claims:
      emits:
        - id: C.fixed_vocab_gap
          statement: "Silent spelling changes the interface problem from selecting among fixed commands to producing character strings that can express unseen words."
          type: positioning
          required_in_core: true
      supports: [C.epg_signal]
    evidence:
      artifacts:
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_report_md
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_coverage_matrix_csv
        - A_results_related_work_survey_epgspeller_2026_06_27_v2_references_audit_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.problem.fixed_vocabulary
          role: gap
          group: intro_problem
          order: 1
          text: >
            The key interface question is therefore not simply whether EPG can recognize a known silent
            command. EPGSpeller asks whether the contact signal can be decoded at the character level.
            Character-level silent spelling breaks the fixed-vocabulary limitation of command recognition:
            if the spelling stream is recognized well enough, the user is no longer restricted to words
            that were present as output classes during training. The related-work comparison also motivates
            keeping command recognition, modality-specific SSI systems, and LM-assisted text entry separate
            from the present lexicon-free EPG spelling claim.
    reviewer_risk:
      objection: "The paper could be read as another recognizer benchmark rather than an AAC text-entry paper."
      mitigation: "Make the fixed-vocabulary limitation the Introduction gap, then use experiments to bound how far the system gets."
    status: answered

  Q.claim.central:
    question: "What is the central claim?"
    answer: "EPGSpeller is not just a better recognizer: it demonstrates lexicon-free silent spelling as a hands-free AAC text-entry path, while showing that calibration rather than decoding speed is the remaining bottleneck."
    placement: {slot: core.claim, order: 1, priority: required, core_required: true, extension_only: false, role: central_claim, rhetorical_role: intro.central_claim}
    claims:
      emits:
        - id: C.central
          statement: "EPGSpeller supports lexicon-free EPG silent spelling with strong personalized recognition, but cross-user calibration remains unresolved."
          type: central_claim
          required_in_core: true
      supports: [C.fixed_vocab_gap]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
        - A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
        - A_results_slt_p2_20260626_kshot_feasibility_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_preproc20260626_preproc_ablation_report_md
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.claim.central
          role: central_claim
          rhetorical_role: intro.central_claim
          group: intro_claim
          order: 1
          text: >
            This paper presents EPGSpeller, a character-level recognizer for electropalatographic silent
            spelling. The contribution is not only a lower-error decoder. The system shows that EPG can be
            framed as a hands-free AAC text-entry interface that is no longer tied to a fixed command
            vocabulary. At the same time, the experiments deliberately expose the remaining bottleneck:
            personalized calibration is effective, whereas cross-participant transfer and high-shot
            calibration are still constrained by the available data. The preprocessing sweep reinforces this
            interpretation by showing that simple normalization changes cross-user errors but does not turn
            them into personalized recognition.
    reviewer_risk:
      objection: "A broad SOTA claim would be too strong with four participants and partly historical data."
      mitigation: "Claim strong personalized EPG spelling and calibrated limits, not universal SOTA across silent speech interfaces."
    status: answered

  Q.claim.evidence_preview:
    question: "What evidence preview should the Introduction give?"
    answer: "The Introduction should preview the personalized, word-holdout, calibration, transfer, and preprocessing checks without dumping detailed result numbers."
    placement: {slot: core.claim, order: 2, priority: required, core_required: true, extension_only: false, role: central_claim, rhetorical_role: intro.evidence_preview}
    claims: {emits: [], supports: [C.central]}
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
        - A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.claim.evidence_preview
          role: central_claim
          group: intro_claim
          order: 1
          text: >
            The evidence is organized around that claim boundary. The paper first tests personalized and
            word-holdout spelling recognition, then asks whether calibration can be reduced, and finally
            checks whether multi-source transfer or simple preprocessing removes the user-dependence.
    reviewer_risk:
      objection: "The Introduction could feel like a promise without a roadmap."
      mitigation: "Preview the exact result blocks while leaving detailed numbers to Results."
    status: answered

  Q.claim.contributions:
    question: "What contributions should be stated without turning the paper into a benchmark-only framing?"
    answer: "The contribution is the AAC spelling framing, the lexicon-free recognizer, the SilentSpeller-compatible bridge, and the explicit calibration boundary."
    placement: {slot: core.claim, order: 3, priority: required, core_required: true, extension_only: false, role: central_claim, rhetorical_role: intro.contributions}
    claims: {emits: [], supports: [C.central]}
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
        - A_results_slt_p2_20260626_kshot_feasibility_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.claim.contributions
          role: central_claim
          group: intro_claim
          order: 1
          text: >
            The contributions are: (1) an AAC-centered framing of SmartPalate EPG as a character-level
            silent spelling channel, (2) a high-performing lexicon-free vector/GRU recognizer for that task,
            and (3) evidence that connects personalized spelling, SilentSpeller-compatible word holdout, and
            calibration limits without hiding the remaining user-dependence behind a single benchmark score.
    reviewer_risk:
      objection: "The contribution list could drift back toward a pure evaluation-contract framing."
      mitigation: "Keep the first contribution as the AAC text-entry reframing, then state the experimental support."
    status: answered

  Q.method.00_signal_representation:
    question: "How is the EPG signal represented for decoding?"
    answer: "Each trial is represented as an ordered EPG contact-frame sequence, keeping the task tied to tongue-palate contact rather than audio or manual labels."
    placement: {slot: core.method, order: 1, priority: required, core_required: true, extension_only: false, role: method, rhetorical_role: method.signal_representation}
    claims: {emits: [], supports: [C.epg_signal, C.task]}
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_dataset_summary_csv
        - A_results_dataset_audit_silentspeller_2026_02_24_dataset_summary_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.method.signal_representation
          role: method
          group: method_task
          order: 1
          text: >
            The input representation is the EPG contact stream itself: each trial is treated as an ordered
            sequence of palate-contact frames rather than as audio, video, or a manually segmented phone
            sequence. This keeps the task tied to the SmartPalate-style signal and makes the decoding claim
            about silent tongue-palate contact.
    reviewer_risk:
      objection: "The task could be confused with acoustic ASR or phone-level annotation."
      mitigation: "State the frame-level EPG input before the CTC recognizer is introduced."
    status: answered

  Q.method.01_task_definition:
    question: "What task or problem setting is studied?"
    answer: "The task is lexicon-free character recognition from EPG contact sequences, evaluated with greedy character error rate and separated from lexicon projection."
    placement: {slot: core.method, order: 2, priority: required, core_required: true, extension_only: false, role: method, rhetorical_role: method.task_object}
    claims:
      emits:
        - id: C.task
          statement: "The primary task is greedy character-level decoding from EPG time series rather than closed-set word classification."
          type: task_definition
          required_in_core: true
      supports: [C.central]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_dataset_summary_csv
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.task.definition
          role: method
          rhetorical_role: method.task_object
          group: method_task
          order: 1
          text: >
            Given an EPG contact sequence, the model outputs a character string. We treat greedy
            character-level decoding as the primary lexicon-free result. Lexicon-projected scores are useful
            diagnostics, but they are not allowed to carry the central claim because an AAC spelling
            interface must eventually support words and messages outside a fixed evaluation lexicon.
    reviewer_risk:
      objection: "Lexicon-free could be undermined if lexicon projection is mixed into the main result."
      mitigation: "Keep greedy CER as the main metric and label lexicon-projected results as secondary diagnostics."
    status: answered

  Q.method.02_workflow:
    question: "What method or system is proposed?"
    answer: "EPGSpeller combines CTC sequence recognition with EPG-specific front ends and regularization, while keeping the fastest vector/GRU recognizer as the main reporting path."
    placement: {slot: core.method, order: 3, priority: required, core_required: true, extension_only: false, role: method, rhetorical_role: method.model_core}
    claims:
      emits:
        - id: C.workflow
          statement: "EPGSpeller uses character-level CTC sequence modeling for silent spelling from EPG contact time series."
          type: method
          required_in_core: true
      supports: [C.task]
    evidence:
      artifacts:
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_msx20260224_paper_tables_table_spatial_k124_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.method.workflow
          role: method
          rhetorical_role: method.model_core
          group: method_workflow
          order: 1
          text: >
            EPGSpeller uses a character-level CTC recognizer over EPG frames. We evaluate a high-capacity
            vector/GRU recognizer as the main system and compare it with layout-aware variants that use
            row-column pooling or two-dimensional palatal grids. The design goal is deliberately pragmatic:
            maximize silent spelling accuracy under lexicon-free decoding, then use ablations to ask which
            EPG-specific inductive biases help under the same protocols.
    reviewer_risk:
      objection: "Spatial front ends might be mistaken for the central novelty even when they do not win."
      mitigation: "Frame spatial modeling as an ablation; keep the AAC spelling system and calibration finding central."
    status: answered

  Q.method.03_variant_scope:
    question: "Which model variants are part of the claim, and which are ablations?"
    answer: "The vector/GRU recognizer carries the interface claim; layout-aware and reduced-electrode variants are controlled ablations."
    placement: {slot: core.method, order: 4, priority: required, core_required: true, extension_only: false, role: method, rhetorical_role: method.variant_scope}
    claims: {emits: [], supports: [C.workflow]}
    evidence:
      artifacts:
        - A_results_msx20260224_paper_tables_table_spatial_k124_csv
        - A_results_msx20260224_paper_tables_table_k64_methods_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.method.variant_scope
          role: method
          group: method_workflow
          order: 1
          text: >
            The method scope is therefore intentionally narrow. The vector/GRU system is the main recognizer
            used for the paper's interface claim, while layout-aware and reduced-electrode variants are
            treated as controlled engineering ablations under the same decoding and reporting rules.
    reviewer_risk:
      objection: "A reader may mistake every ablation for a proposed production architecture."
      mitigation: "Separate the main recognizer from engineering variants before Results."
    status: answered

  Q.setup.data_protocols:
    question: "What data and evaluation protocols are used?"
    answer: "The paper uses four participant datasets and reports personalized, word-holdout, cross-participant, multi-source, and low-shot calibration settings."
    placement: {slot: core.evaluation, order: 1, priority: required, core_required: true, extension_only: false, role: evaluation, rhetorical_role: eval.data}
    claims:
      emits:
        - id: C.protocols
          statement: "The evaluation separates personalized recognition, unseen-word spelling, cross-participant transfer, and calibration conditions."
          type: evaluation
          required_in_core: true
      supports: [C.central]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_dataset_summary_csv
        - A_results_dataset_audit_silentspeller_2026_02_24_dataset_summary_csv
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_slt_p2_20260626_paper_tables_table_lowshot_extended_csv
        - A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.setup.data
          role: evaluation
          group: eval_setup
          order: 1
          text: >
            The evaluation uses four SilentSpeller-style EPG datasets with different repetition densities:
            p1 and p2 each contain 2328 trials over 1164 word types, p3 contains 2797 trials over 1164 word
            types, and p4 contains 1167 trials over 1162 word types. The dataset summary table supports the
            feasibility decisions used later in the calibration analysis, because low-shot and high-shot
            calibration depend on repeated productions per word, not only on the number of participants.
        - type: table
          id: tab.dataset_summary
          label: tab:dataset_summary
          source_artifact: A_results_paper_layout_2026_03_03_table_dataset_summary_csv
          caption: "Dataset audit summary for the SilentSpeller-style EPG recordings."
          role: evaluation
          rhetorical_role: eval.data
          order: 2
    reviewer_risk:
      objection: "Different protocols could be conflated."
      mitigation: "Define each protocol by the user/word/calibration question it answers."
    status: answered

  Q.setup.protocols:
    question: "Which evaluation protocols answer which scientific questions?"
    answer: "Personalized, word-holdout, cross-participant, multi-source, and k-shot protocols are separated by whether they test recognition, unseen-word spelling, transfer, or calibration."
    placement: {slot: core.evaluation, order: 2, priority: required, core_required: true, extension_only: false, role: evaluation, rhetorical_role: eval.protocols}
    claims: {emits: [], supports: [C.protocols, C.central]}
    evidence:
      artifacts:
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_slt_p2_20260626_paper_tables_table_lowshot_extended_csv
        - A_results_slt_p2_20260626_paper_tables_table_kshot_curve_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.setup.protocols
          role: evaluation
          group: eval_setup
          order: 1
          text: >
            The evaluation separates the claims that matter for an AAC spelling interface. Personalized
            protocols measure whether the recognizer can work after user-specific training; word-holdout
            protocols ask whether spelling generalizes beyond training word types; cross-participant protocols
            test whether a model can be reused without target calibration; and k-shot protocols measure how
            much target-user calibration is needed. Reported tables aggregate repeated runs by condition and
            keep incompatible protocols separate rather than pooling instance holdout, word holdout, and
            cross-participant transfer into one score.
    reviewer_risk:
      objection: "A reviewer could treat protocol differences as cherry-picking."
      mitigation: "State the question answered by each protocol before reporting any result."
    status: answered

  Q.setup.metrics:
    question: "What metrics and reporting conventions protect the lexicon-free claim?"
    answer: "The paper reports greedy CER as the primary measure, lexicon projection as secondary, and RTF to document inference speed."
    placement: {slot: core.evaluation, order: 3, priority: required, core_required: true, extension_only: false, role: evaluation, rhetorical_role: eval.metrics}
    claims:
      emits:
        - id: C.metrics
          statement: "Greedy character error rate is the primary recognition metric; lexicon-projected scores and real-time factor are reported separately."
          type: evaluation
          required_in_core: true
      supports: [C.task]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_msx20260224_paper_tables_table_main_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.setup.metrics
          role: evaluation
          group: eval_setup
          order: 3
          text: >
            The primary metric is greedy character error rate (CER), computed without projecting the output
            onto a candidate lexicon. Where useful, we also report lexicon-projected scores to compare with
            closed-vocabulary behavior, but those values are not used as the main evidence for lexicon-free
            text entry. Real-time factor (RTF) is reported separately to show that decoding latency is not
            the main obstacle in the present experiments.
    reviewer_risk:
      objection: "A reviewer may suspect post-processing is hidden in the main result."
      mitigation: "Explicitly state that greedy CER carries the main claim."
    status: answered

  Q.setup.controls:
    question: "What baselines and controls keep the main claim interpretable?"
    answer: "The main vector/GRU recognizer, SilentSpeller-compatible-lite word holdout, lexicon projection, preprocessing, spatial-front-end, and electrode-budget controls are separated by purpose."
    placement: {slot: core.evaluation, order: 4, priority: required, core_required: true, extension_only: false, role: evaluation, rhetorical_role: eval.baselines_controls}
    claims: {emits: [], supports: [C.metrics, C.protocols]}
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_slt_p2_20260626_paper_tables_table_silentspeller_lite_csv
        - A_results_preproc20260626_paper_tables_table_preproc_protocol_condition_csv
        - A_results_msx20260224_paper_tables_table_spatial_k124_csv
        - A_results_msx20260224_paper_tables_table_k64_methods_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.setup.baselines_controls
          role: evaluation
          group: eval_setup
          order: 1
          text_by_profile:
            core4: >
              Baselines and controls are separated by what they test. The main vector/GRU path carries the
              recognition result; SilentSpeller-compatible-lite word holdout connects to the historical task;
              lexicon projection is reported only as a closed-vocabulary diagnostic; and transfer and
              preprocessing controls are used to bound the calibration claim rather than to redefine the
              primary task.
            slt2026: >
              Baselines and controls are separated by what they test. The main vector/GRU path carries the
              recognition result; SilentSpeller-compatible-lite word holdout connects to the historical task;
              lexicon projection is reported only as a closed-vocabulary diagnostic; and preprocessing,
              spatial-front-end, and electrode-budget variants are used as ablations rather than as alternate
              definitions of the primary task. This separation is what keeps the lexicon-free claim attached
              to greedy CER instead of to a lexicon projection or a favorable post-processing condition.
    reviewer_risk:
      objection: "Ablation results could be mistaken for alternate primary decoding conditions."
      mitigation: "Define controls as interpretation checks, not as changes to the lexicon-free metric."
    status: answered

  Q.result.01_personalized:
    question: "How well does EPGSpeller work when user-specific training is available?"
    answer: "The vector/GRU recognizer reaches strong personalized performance, with P1 CER 0.1796 and P2 CER 0.1451 in the main table."
    placement: {slot: core.result, order: 1, priority: required, core_required: true, extension_only: false, role: main_result, result_role: primary_evidence}
    claims:
      emits:
        - id: C.personalized_result
          statement: "Under personalized or within-participant conditions, EPGSpeller achieves substantially lower greedy CER than cross-participant transfer."
          type: main_result
          required_in_core: true
      supports: [C.central, C.metrics]
    evidence:
      artifacts:
        - A_results_paper_layout_2026_03_03_table_main_compact_csv
        - A_results_msx20260224_paper_tables_table_main_csv
      status: ready
    render:
      outputs:
        - type: paragraph
          id: para.result.personalized
          role: main_result
          group: results_main
          order: 1
          text: >
            Table~\ref{tab:main_protocols} gives the central recognition result. With the same vector/GRU
            recognizer and greedy decoding, personalized conditions are much stronger than cross-participant
            transfer: P1 reaches 0.1796 CER, P2 reaches 0.1451 CER, whereas P3 cross-participant transfer
            remains at 0.6909 CER. The contrast is the main empirical shape of the paper: EPG silent spelling
            is viable after user-specific calibration, but it is not yet ready for deployment to a new user
            without target calibration.
        - type: table
          id: tab.main_protocols
          label: tab:main_protocols
          source_artifact: A_results_paper_layout_2026_03_03_table_main_compact_csv
          caption: "Main protocol recap for the vector/GRU recognizer. CER is greedy character error rate; lex_all is lexicon-projected error."
          role: main_result
          order: 2
    reviewer_risk:
      objection: "The result could be oversold as a general cross-user solution."
      mitigation: "Make the personalized/cross-participant contrast explicit in the first Results paragraph."
    status: answered

  Q.result.02_silentspeller_lite:
    question: "How does the system connect to SilentSpeller-style unseen-word evaluation?"
    answer: "A SilentSpeller-compatible-lite word-holdout condition with 100 unseen test word types gives CER 0.1133 +/- 0.0128 for subj1."
    placement: {slot: core.result, order: 2, priority: required, core_required: true, extension_only: false, role: main_result, result_role: task_validity}
    claims:
      emits:
